<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hoja de Ruta - Optimizado</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<!-- Leaflet & XLSX -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Marker Cluster (agrupación de puntos) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* VARIABLES Y ESTILO BASE */
:root {
  --bg-primary: #070d19;
  --bg-secondary: rgba(13, 22, 41, 0.75);
  --bg-card: rgba(20, 32, 59, 0.85);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-hover: rgba(255, 255, 255, 0.18);
  
  --text-primary: #f0f6fc;
  --text-secondary: #8b95a5;
  --text-muted: #58a6ff;
  
  --primary: #3b82f6;
  --primary-hover: #60a5fa;
  --primary-glow: rgba(59, 130, 246, 0.3);
  
  --success: #10b981;
  --success-hover: #34d399;
  --success-glow: rgba(16, 185, 129, 0.25);
  
  --danger: #ef4444;
  --danger-hover: #f87171;
  
  --glass-blur: blur(16px);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
  --font-heading: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* FLOATING TOP BAR */
.topbar {
  position: fixed;
  top: 16px;
  left: 16px;
  right: 16px;
  z-index: 1000;
  background: var(--bg-secondary);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--glass-shadow);
  transition: all 0.3s ease;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(59, 130, 246, 0.15);
  border: 1px solid rgba(59, 130, 246, 0.25);
}
.topbar-title {
  font-family: var(--font-heading);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: -0.2px;
}

/* SEARCH INPUT */
.search-container {
  position: relative;
  flex: 1;
  max-width: 400px;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 12px;
  color: var(--text-secondary);
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 16px 8px 36px;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 13px;
  transition: all 0.2s ease;
  outline: none;
}
.search-input:focus {
  border-color: var(--primary);
  background: rgba(0, 0, 0, 0.4);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.clear-search-btn {
  position: absolute;
  right: 10px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 16px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.clear-search-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.1);
}

/* TOPBAR ACTIONS & CONTROLS */
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}

.counter-badge {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border-color);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.status-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success-glow);
  display: inline-block;
}

.btn-menu {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.btn-menu:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--border-hover);
}
.btn-menu:active {
  transform: scale(0.97);
}

.btn-load {
  border-color: rgba(59, 130, 246, 0.3);
  background: rgba(59, 130, 246, 0.08);
  color: #60a5fa;
}
.btn-load:hover {
  background: rgba(59, 130, 246, 0.15);
  border-color: rgba(59, 130, 246, 0.5);
  color: #fff;
}

/* FLOATING QUICK FILTER BAR */
.quick-filter-bar {
  position: fixed;
  top: 86px;
  left: 16px;
  right: 16px;
  z-index: 998;
  background: var(--bg-secondary);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 8px 16px;
  display: none; /* Only show when data is loaded */
  align-items: center;
  gap: 12px;
  box-shadow: var(--glass-shadow);
  transition: all 0.3s ease;
}
.quick-filter-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  white-space: nowrap;
}

/* CUSTOM MULTI-SELECT DROPDOWNS */
.dropdown {
  position: relative;
}
.dropdown-trigger {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
  outline: none;
}
.dropdown-trigger:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--border-hover);
}
.dd-badge {
  background: var(--primary);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  display: none;
  line-height: 12px;
}
.dd-badge.active {
  display: inline-block;
}
.dropdown-content {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 6px;
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  box-shadow: var(--glass-shadow);
  min-width: 210px;
  z-index: 1001;
  padding: 6px 0;
  animation: fadeIn 0.15s ease-out;
}
.dropdown.open .dropdown-content {
  display: block;
}
.dropdown-scroll {
  max-height: 240px;
  overflow-y: auto;
  padding: 0 6px;
}
.dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
}
.dropdown-item:hover {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
}
.dropdown-item.active {
  color: var(--text-primary);
  background: rgba(59, 130, 246, 0.12);
}
.dropdown-checkbox {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  border: 1.5px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  flex-shrink: 0;
}
.dropdown-item.active .dropdown-checkbox {
  background: var(--primary);
  border-color: var(--primary);
}
.dropdown-checkbox::after {
  content: '✓';
  color: #fff;
  font-size: 10px;
  display: none;
  font-weight: bold;
}
.dropdown-item.active .dropdown-checkbox::after {
  display: block;
}

/* QUICK CLEAR FILTERS BUTTON */
.btn-clear-filters {
  background: rgba(239, 68, 68, 0.08) !important;
  border-color: rgba(239, 68, 68, 0.2) !important;
  color: var(--danger-hover) !important;
  margin-left: auto;
  gap: 6px;
}
.btn-clear-filters:hover {
  background: rgba(239, 68, 68, 0.15) !important;
  border-color: rgba(239, 68, 68, 0.35) !important;
  color: #fff !important;
}

/* MAP CONTAINER */
#map {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1;
  background: var(--bg-primary);
}

/* LEAFLET ZOOM CONTROLS REDESIGN */
.leaflet-bar {
  border: 1px solid var(--border-color) !important;
  box-shadow: var(--glass-shadow) !important;
  border-radius: 12px !important;
  overflow: hidden;
}
.leaflet-bar a {
  background: var(--bg-secondary) !important;
  color: var(--text-primary) !important;
  backdrop-filter: var(--glass-blur) !important;
  -webkit-backdrop-filter: var(--glass-blur) !important;
  border-bottom: 1px solid var(--border-color) !important;
  transition: all 0.2s ease;
  width: 34px !important;
  height: 34px !important;
  line-height: 34px !important;
}
.leaflet-bar a:hover {
  background: rgba(255, 255, 255, 0.08) !important;
  color: #fff !important;
}
.leaflet-control-zoom {
  margin-top: 146px !important; /* Push it down below the topbar and quick filter bar */
  margin-right: 16px !important;
}

/* FLOATING SIDE PANEL (FILTERS) */
.panel {
  position: fixed;
  top: 146px;
  bottom: 24px;
  right: -380px;
  width: 350px;
  z-index: 999;
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
  box-shadow: var(--glass-shadow);
  transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.panel.open {
  right: 16px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 12px;
  margin-bottom: 4px;
}
.panel-title {
  font-family: var(--font-heading);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.2px;
}
.panel-close-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  transition: all 0.2s ease;
}
.panel-close-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.08);
}

.sect-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-bottom: 10px;
  letter-spacing: 0.8px;
}
.chips-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 4px;
}
.chip {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  padding: 7px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.chip:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.07);
}
.chip.active {
  background: linear-gradient(135deg, var(--primary), #1d4ed8);
  border-color: #3b82f6;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--primary-glow);
}

.btn-action {
  width: 100%;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 11px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s ease;
}
.btn-action:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--border-hover);
}
.btn-primary {
  background: var(--success);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 14px var(--success-glow);
}
.btn-primary:hover:not(:disabled) {
  background: var(--success-hover);
  transform: translateY(-1px);
}
.btn-primary:active:not(:disabled) {
  transform: translateY(0);
}
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-clear {
  background: rgba(239, 68, 68, 0.08);
  border-color: rgba(239, 68, 68, 0.2);
  color: var(--danger-hover);
}
.btn-clear:hover {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.35);
  color: #fff;
}

/* FLOOR CONTROLS (THEME SELECTOR & FIT BOUNDS) */
.map-controls-group {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.theme-selector-card {
  background: var(--bg-secondary);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 4px;
  display: flex;
  gap: 4px;
  box-shadow: var(--glass-shadow);
}
.map-theme-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.map-theme-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.05);
}
.map-theme-btn.active {
  color: #fff;
  background: var(--primary);
  box-shadow: 0 2px 8px var(--primary-glow);
}

.fab-map-action {
  background: var(--bg-secondary);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glass-shadow);
  transition: all 0.2s ease;
  width: fit-content;
  outline: none;
}
.fab-map-action:hover {
  border-color: var(--border-hover);
  background: rgba(255, 255, 255, 0.06);
  transform: translateY(-2px);
}
.fab-map-action:active {
  transform: translateY(0);
}

/* COLOR LEGEND PANEL */
.legend-panel {
  position: absolute;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  background: var(--bg-secondary);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: var(--glass-shadow);
  display: none;
  flex-direction: column;
  gap: 6px;
  min-width: 140px;
  animation: fadeIn 0.3s ease;
}
.legend-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 4px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-primary);
}
.legend-color {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* CUSTOM POPUP DESIGN */
.custom-mobile-popup .leaflet-popup-content-wrapper {
  background: var(--bg-card) !important;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: var(--text-primary) !important;
  border: 1px solid var(--border-color);
  border-radius: 16px;
  box-shadow: var(--glass-shadow);
  padding: 4px;
}
.custom-mobile-popup .leaflet-popup-content {
  margin: 12px 14px;
  line-height: 1.4;
}
.custom-mobile-popup .leaflet-popup-tip {
  background: rgba(18, 28, 51, 0.95) !important;
  border: 1px solid var(--border-color);
}
.popup-header {
  margin: 0 0 10px 0;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-color);
}
.popup-title {
  margin: 0;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-heading);
}
.popup-details {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.popup-detail-row {
  display: flex;
  font-size: 11.5px;
  gap: 6px;
}
.popup-detail-label {
  color: var(--text-secondary);
  font-weight: 600;
  width: 90px;
  flex-shrink: 0;
}
.popup-detail-val {
  color: var(--text-primary);
}
.popup-gps-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: var(--success);
  color: #fff;
  text-decoration: none;
  padding: 9px 12px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 12.5px;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px var(--success-glow);
}
.popup-gps-btn:hover {
  background: var(--success-hover);
  transform: translateY(-1px);
}
.popup-gps-btn:active {
  transform: translateY(0);
}

/* CUSTOM PIN MARKERS (CSS & GRADIENTS) */
.custom-leaflet-marker {
  background: transparent;
  border: none;
}
.custom-marker-wrapper {
  position: relative;
  width: 30px;
  height: 42px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.custom-marker-pin {
  width: 28px;
  height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #fff;
  box-shadow: 0 3px 8px rgba(0,0,0,0.45);
  transition: all 0.2s ease;
}
.custom-marker-pin span {
  transform: rotate(45deg);
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  font-family: var(--font-heading);
}
.custom-marker-shadow {
  width: 14px;
  height: 4px;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

/* Hover Zoom */
.custom-leaflet-marker:hover .custom-marker-pin {
  transform: rotate(-45deg) scale(1.2);
  box-shadow: 0 6px 14px rgba(0,0,0,0.5);
}

/* Pulsing rings for special segments */
.marker-pulse {
  position: absolute;
  top: 4px;
  left: 5px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.8);
  animation: markerPulseAnim 1.8s infinite ease-out;
  pointer-events: none;
  z-index: -1;
}
@keyframes markerPulseAnim {
  0% {
    transform: scale(0.7);
    box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.85);
  }
  70% {
    transform: scale(2.2);
    box-shadow: 0 0 0 8px rgba(245, 158, 11, 0);
  }
  100% {
    transform: scale(2.4);
    box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
  }
}

/* MODAL / FILE LOADER */

<script>
// ===== VARIABLES GLOBALES Y CONFIGURACIÓN =====
let MAP, LAY;
let ALL = []; 
let selV = [], selD = [], selN = [], selR = []; // Filters supporting multi-select
let exEst = false, exElite = false;
let searchQuery = '';
let fData = null;

// MAP LAYERS CONFIGURATION (THEMES)
const MAP_THEMES = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors, © CartoDB'
  }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors, © CartoDB'
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri, Maxar'
  })
};
let currentTheme = 'dark';

// ===== INITIALIZATION =====
document.addEventListener("DOMContentLoaded", () => {
  // Init Map
  MAP = L.map('map', {
    zoomControl: false, 
    dragging: true,
    tap: false
  }).setView([-27.367, -55.896], 13); // Posadas coords as default center

  // Set default theme
  MAP_THEMES[currentTheme].addTo(MAP);

  // Position Zoom Control
  L.control.zoom({ position: 'topright' }).addTo(MAP);
  
  // Layers group
  LAY = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 60,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cluster){
      const count = cluster.getChildCount();
      let cls = 'cl-small', s = 38;
      if (count >= 100) { cls = 'cl-large'; s = 54; }
      else if (count >= 25) { cls = 'cl-medium'; s = 46; }
      const fs = s >= 54 ? 15 : (s >= 46 ? 14 : 13);
      return L.divIcon({
        html: '<div class="cluster-inner" style="width:'+s+'px;height:'+s+'px;font-size:'+fs+'px;">'+count+'</div>',
        className: 'custom-cluster ' + cls,
        iconSize: L.point(s, s)
      });
    }
  }).addTo(MAP);

  // Setup Drag & Drop listeners
  const dropZone = document.getElementById('drop');
  if (dropZone) {
    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
      }, false);
    });

    dropZone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      const fileInput = document.getElementById('fi');
      if (files.length) {
        fileInput.files = files;
        hFi(fileInput);
      }
    }, false);
  }

  // Close dropdowns when clicking outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown').forEach(dd => dd.classList.remove('open'));
    }
  });

  cargarLocal();
});

// ===== MULTI-SELECT DROPDOWNS CONTROL =====
function toggleDropdown(id) {
  const dd = document.getElementById(id);
  const wasOpen = dd.classList.contains('open');
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
  if (!wasOpen) {
    dd.classList.add('open');
  }
}

// ===== MAP THEME SELECTOR =====
function setMapTheme(themeName) {
  if (!MAP_THEMES[themeName]) return;
  
  Object.keys(MAP_THEMES).forEach(k => {
    if (MAP.hasLayer(MAP_THEMES[k])) {
      MAP.removeLayer(MAP_THEMES[k]);
    }
  });
  
  MAP_THEMES[themeName].addTo(MAP);
  currentTheme = themeName;
  
  document.querySelectorAll('.map-theme-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.theme === themeName) {
      btn.classList.add('active');
    }
  });
}

// ===== AUTO ZOOM VIEWPORT (FIT BOUNDS) =====
function fitVisibleBounds() {
  if (LAY.getLayers().length > 0) {
    const group = L.featureGroup(LAY.getLayers());
    MAP.fitBounds(group.getBounds(), { padding: [50, 50] });
  }
}

// ===== UI CONTROL =====
function toggleP(){ document.getElementById('panel').classList.toggle('open'); }
function openM(){ document.getElementById('modal').classList.add('open'); }
function closeM(){ document.getElementById('modal').classList.remove('open'); }

// ===== SEARCH LOGIC =====
function setSearchQuery(val) {
  searchQuery = val;
  const clearBtn = document.getElementById('clear-search');
  if (clearBtn) {
    clearBtn.style.display = val ? 'block' : 'none';
  }
  render();
}

// FORMAT DAY ABBREVIATIONS TO FULL READABLE TEXT
function formatDayText(diasArr) {
  const translations = {
    'lu': 'Lunes', 'ma': 'Martes', 'mi': 'Miércoles', 'ju': 'Jueves', 'vi': 'Viernes', 'sa': 'Sábado', 'do': 'Domingo',
    'lunes': 'Lunes', 'martes': 'Martes', 'miercoles': 'Miércoles', 'miércoles': 'Miércoles', 'jueves': 'Jueves', 'viernes': 'Viernes', 'sabado': 'Sábado', 'sábado': 'Sábado',
    'lu-mi-vi': 'Lunes - Miércoles - Viernes', 'ma-ju': 'Martes - Jueves', 'lu-ma-mi-ju-vi-sa': 'Lunes a Sábado'
  };
  
  let result = [];
  diasArr.forEach(d => {
    const clean = d.toLowerCase().trim();
    if (translations[clean]) {
      result.push(translations[clean]);
    } else {
      let parts = clean.split(/[-/ ,]+/);
      let translatedParts = [];
      parts.forEach(p => {
        if (translations[p]) {
          translatedParts.push(translations[p]);
        } else {
          // If it is binary like 0000100, do not translate but keep uppercase
          if (p.trim() !== '') {
            translatedParts.push(p.toUpperCase());
          }
        }
      });
      if (translatedParts.length > 0) {
        result.push(translatedParts.join(' - '));
      } else {
        result.push(d);
      }
    }
  });
  
  const finalStr = Array.from(new Set(result)).join(' - ');
  return finalStr || 'No asignada';
}

function clearSearch() {
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.value = '';
  }
  setSearchQuery('');
}

// ===== MARKER COLOR ASSIGNMENT BY VISIT DAY =====
function getMarkerColor(diaTexto) {
  if (!diaTexto) return '#6366f1'; // Default Indigo
  const text = diaTexto.toLowerCase();
  if (text.includes('lunes')) return '#3b82f6'; // Blue
  if (text.includes('martes')) return '#10b981'; // Emerald
  if (text.includes('miércoles') || text.includes('miercoles')) return '#8b5cf6'; // Purple
  if (text.includes('jueves')) return '#f59e0b'; // Amber
  if (text.includes('viernes')) return '#ec4899'; // Pink
  if (text.includes('sábado') || text.includes('sabado')) return '#14b8a6'; // Teal
  return '#6366f1'; // Fallback
}

// ===== DYNAMIC PIN MARKER CREATOR =====
function createCustomMarker(c) {
  const color = getMarkerColor(c.dia_texto);
  const isSpecial = c.elite && (c.elite.toLowerCase().includes('elite') || c.elite.toLowerCase().includes('estacion') || c.elite.toLowerCase().includes('estación'));
  
  const ringColor = isSpecial ? '#f59e0b' : '#ffffff';
  const markerClass = isSpecial ? 'custom-marker-pin special' : 'custom-marker-pin';
  const pulseHTML = isSpecial ? '<div class="marker-pulse"></div>' : '';
  
  let labelChar = 'C';
  if (c.nombre) {
    const clean = c.nombre.trim();
    if (clean.length > 0) labelChar = clean.charAt(0).toUpperCase();
  }
  
  const htmlContent = `
    <div class="custom-marker-wrapper">
      ${pulseHTML}
      <div class="${markerClass}" style="background-color: ${color}; border-color: ${ringColor}">
        <span>${labelChar}</span>
      </div>
      <div class="custom-marker-shadow"></div>
    </div>
  `;
  
  return L.divIcon({
    html: htmlContent,
    className: 'custom-leaflet-marker',
    iconSize: [30, 42],
    iconAnchor: [15, 42],
    popupAnchor: [0, -40]
  });
}

// ===== PARSE AND IMPORT EXCEL =====
function hFi(input){
  if(input.files && input.files[0]){
    fData = input.files[0];
    document.getElementById('drop-text').innerHTML = `📄 <strong>${fData.name}</strong><br><span style="font-size: 11.5px; opacity: 0.8; color: var(--text-muted)">Archivo cargado correctamente</span>`;
    document.getElementById('bgo').disabled = false;
  }
}

function G(r, k){
  for(let i=0; i<k.length; i++){
    if(r[k[i]] !== undefined && r[k[i]] !== null) return r[k[i]];
  }
  return '';
}

function pEx(){
  if (!fData) return;
  const st = document.getElementById('mst');
  document.getElementById('bgo').disabled = true;
  st.className = 'mstatus loading'; 
  st.textContent = 'Procesando coordenadas y clientes...'; 
  st.style.display = 'block';

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      const sheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(worksheet);

      let nd = [];
      json.forEach(row => {
        let lat = parseFloat(G(row, ['Latitud','Lat','latitud','lat']));
        let lng = parseFloat(G(row, ['Longitud','Lng','longitud','lng','Long']));
        if(isNaN(lat) || isNaN(lng)) return;

        let rawDias = [];
        // Check individual day columns
        let hasIndividualDays = false;
        ['Lunes', 'Martes', 'Miercoles', 'Jueves', 'Viernes', 'Sabado'].forEach(d => {
          if (row[d] && String(row[d]).trim().toLowerCase() !== 'no' && String(row[d]).trim() !== '') {
            rawDias.push(d);
            hasIndividualDays = true;
          }
        });
        
        if (!hasIndividualDays) {
          // Look inside general day columns
          for (let k of ['Dia-visitas', 'Dia', 'Día', 'Frecuencia', 'Dia Visita']) {
            if (row[k] && String(row[k]).trim() !== '') {
              rawDias.push(String(row[k]).trim());
              break;
            }
          }
          // Fallback
          if (rawDias.length === 0 && row['Dias Visita'] && String(row['Dias Visita']).trim() !== '') {
            rawDias.push(String(row['Dias Visita']).trim());
          }
        }

        nd.push({
          cod: String(G(row, ['Código','Cod','codigo','cod','Cliente'])||''),
          nombre: String(G(row, ['Nombre','Razon Social','RazonSocial','Nya','NYA','Cliente'])||'Sin Nombre'),
          dir: String(G(row, ['Dirección','Direccion','dir','domicilio'])||''),
          dia_texto: formatDayText(rawDias),
          negocio: String(G(row, ['Negocio','negocio','Rubro'])||''),
          elite: String(G(row, ['Elite / Estaciones','Elite','Estaciones'])||''),
          vendedor: String(G(row, ['Vendedor','Vende','vendedor','vende'])||''),
          zona_vta: String(G(row, ['Zona Vta','Zona Venta','ZonaVta'])||''),
          zona_rep: String(G(row, ['Zona Reparto','Zona Rep','ZonaReparto'])||''),
          lat, lng
        });
      });

      if(!nd.length) throw new Error('No se encontraron coordenadas válidas en las filas del Excel.');
      
      ALL = nd; selV = []; selD = []; selN = []; selR = []; exEst = false; exElite = false;
      guardarLocal();
      buildSchips(); buildNchips(); buildVchips(); buildDchips(); buildRchips(); render();
      
      st.className = 'mstatus ok';
      st.textContent = `✓ ${nd.length} clientes cargados con éxito.`;
      
      // Auto adjust bounds on load
      setTimeout(() => {
        fitVisibleBounds();
        closeM();
        st.style.display = 'none';
        st.className = 'mstatus';
      }, 1500);
    } catch(err) {
      st.className = 'mstatus er';
      st.textContent = 'Error: ' + err.message;
      document.getElementById('bgo').disabled = false;
    }
  };
  reader.readAsArrayBuffer(fData);
}

// ===== LOCALSTORAGE (MEMORIA) =====
const LS_KEY = 'hojaRuta_datos_v1';
function guardarLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(ALL)); }catch(e){} }
function cargarLocal(){
  try{
    const s = localStorage.getItem(LS_KEY);
    if(s){ 
      const guardado = JSON.parse(s);
      if(Array.isArray(guardado) && guardado.length){
        ALL = guardado;
      }
    }
  }catch(e){}
  // Si no hay nada guardado, usar la base embebida por defecto
  if(!Array.isArray(ALL) || !ALL.length){
    if(typeof DATOS_EMBEBIDOS !== 'undefined' && DATOS_EMBEBIDOS.length){
      ALL = DATOS_EMBEBIDOS;
    }
  }
  if(Array.isArray(ALL) && ALL.length){
    buildSchips(); buildNchips(); buildVchips(); buildDchips(); buildRchips(); render();
    setTimeout(fitVisibleBounds, 500);
  }
}

// ===== FILTER INTERFACE CONSTRUCTORS =====
function buildDchips(){
  const c = document.getElementById('ch-dias'); c.innerHTML = '';
  const ddList = document.getElementById('dd-list-dias');
  if (ddList) ddList.innerHTML = '';
  
  let set = new Set();
  ALL.forEach(x => { if(x.dia_texto) x.dia_texto.split(' - ').forEach(d => set.add(d.trim())); });
  const sorted = Array.from(set).sort();
  
  // Badge count update
  const badge = document.getElementById('badge-dias');
  if (badge) {
    badge.textContent = selD.length;
    badge.className = 'dd-badge' + (selD.length > 0 ? ' active' : '');
  }

  sorted.forEach(d => {
    const isActive = selD.includes(d);
    
    // Sidebar Chip
    let div = document.createElement('div'); 
    div.className = 'chip' + (isActive ? ' active' : '');
    div.textContent = d; 
    div.onclick = () => toggleDiaFilter(d);
    c.appendChild(div);
    
    // Dropdown Item
    if (ddList) {
      let item = document.createElement('div');
      item.className = 'dropdown-item' + (isActive ? ' active' : '');
      item.innerHTML = `<div class="dropdown-checkbox"></div><span>${d}</span>`;
      item.onclick = (e) => {
        e.stopPropagation();
        toggleDiaFilter(d);
      };
      ddList.appendChild(item);
    }
  });
}

function toggleDiaFilter(d) {
  if(selD.includes(d)) selD = selD.filter(x => x!==d);
  else selD.push(d);
  buildDchips();
  render();
}

function togElt(){ exElite=!exElite; buildSchips(); render(); }

function resetF(){ 
  selV=[]; selD=[]; selN=[]; selR=[]; exEst=false; exElite=false; searchQuery='';
  document.getElementById('search-input').value = '';
  document.getElementById('clear-search').style.display = 'none';
  buildSchips(); buildNchips(); buildVchips(); buildDchips(); buildRchips(); render(); 
}

// ===== MAP RENDER ENGINE =====
function render(){
  LAY.clearLayers();
  
  // Show legend and quick filter bar only if database is loaded
  const legend = document.getElementById('legend-panel');
  if (legend) {
    legend.style.display = ALL.length > 0 ? 'flex' : 'none';
  }
  const qfBar = document.getElementById('quick-filter-bar');
  if (qfBar) {
    qfBar.style.display = ALL.length > 0 ? 'flex' : 'none';
  }

  // Dynamic quick-clear filters button visibility
  const hasActiveFilters = selD.length > 0 || selV.length > 0 || selR.length > 0 || selN.length > 0 || exEst || exElite || searchQuery !== '';
  const clearBtn = document.getElementById('btn-clear-quick');
  if (clearBtn) {
    clearBtn.style.display = hasActiveFilters ? 'flex' : 'none';
  }

  if(!ALL.length){ 
    document.getElementById('c-count').textContent = '0 / 0'; 
    return; 
  }

  let count = 0;
  const query = searchQuery.toLowerCase().trim();
  const _markers = [];

  ALL.forEach(c => {
    // Multi-select Visit Day filter
    if(selD.length) {
      let match = false;
      selD.forEach(d => {
        if(c.dia_texto && c.dia_texto.toLowerCase().includes(d.toLowerCase())) match = true;
      });
      if(!match) return;
    }
    
    // Multi-select Business Channel filter
    if(selN.length) {
      if(!c.negocio || !selN.includes(c.negocio.trim())) return;
    }
    
    // Multi-select Seller (Vendedor) filter
    if(selV.length && (!c.vendedor || !selV.includes(c.vendedor.trim()))) return;

    // Multi-select Zona de Reparto filter
    if(selR.length && (!c.zona_rep || !selR.includes(c.zona_rep.trim()))) return;
    
    // Special segments
    if(exEst || exElite){
      let match = false;
      let elStr = c.elite ? c.elite.toLowerCase() : '';
      if(exEst && (elStr.includes('estacion') || elStr.includes('estación'))) match = true;
      if(exElite && elStr.includes('elite')) match = true;
      if(!match) return;
    }

    // Search Query Filter
    if (query) {
      const matchName = c.nombre && c.nombre.toLowerCase().includes(query);
      const matchCod = c.cod && c.cod.toLowerCase().includes(query);
      const matchDir = c.dir && c.dir.toLowerCase().includes(query);
      if (!matchName && !matchCod && !matchDir) return;
    }

    count++;
    
    // GPS Action Navigation URL
    const urlGps = `https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lng}`;

    const phtml = `
      <div style="font-family: var(--font-body); color: var(--text-primary); min-width: 220px;">
        <div class="popup-header">
          <h4 class="popup-title">${c.nombre}</h4>
        </div>
        <div class="popup-details">
          <div class="popup-detail-row">
            <span class="popup-detail-label">Código:</span>
            <span class="popup-detail-val">${c.cod || 'Sin código'}</span>
          </div>
          <div class="popup-detail-row">
            <span class="popup-detail-label">Dirección:</span>
            <span class="popup-detail-val">${c.dir || 'Sin dirección'}</span>
          </div>
          <div class="popup-detail-row">
            <span class="popup-detail-label">Vendedor:</span>
            <span class="popup-detail-val">${c.vendedor || 'Sin vendedor'}</span>
          </div>
          <div class="popup-detail-row">
            <span class="popup-detail-label">Zona Reparto:</span>
            <span class="popup-detail-val">${c.zona_rep || 'Sin reparto'}</span>
          </div>
          <div class="popup-detail-row">
            <span class="popup-detail-label">Frecuencia:</span>
            <span class="popup-detail-val" style="color: var(--text-muted); font-weight: 500;">
              ${c.dia_texto || 'No asignada'}
            </span>
          </div>
        </div>
        
        <a href="${urlGps}" target="_blank" rel="noopener" class="popup-gps-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
          </svg>
          Iniciar Navegación GPS
        </a>
      </div>
    `;

    const marker = L.marker([c.lat, c.lng], { icon: createCustomMarker(c) })
      .bindPopup(phtml, { maxWidth: 280, className: 'custom-mobile-popup' });
    
    _markers.push(marker);
  });

  LAY.addLayers(_markers);

  document.getElementById('c-count').textContent = `${count} / ${ALL.length}`;
}
